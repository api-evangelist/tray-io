    name: Tray.io Platform API
    description: >-
      The Tray.io Platform API allows developers to leverage the power of
      Tray's service connectors without using the Builder UI, enabling native
      integration of third-party APIs into applications without worrying about
      different protocols and data formats.
    humanURL: https://tray.ai
